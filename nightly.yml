name: Rejsekort pipeline — nightly refresh

on:
  schedule:
    - cron: "0 4 * * *"   # runs every night at 04:00 UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python environment ─────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium --with-deps

      # ── 3. DVC ───────────────────────────────────────────────────────────────
      - name: Install DVC
        run: pip install dvc

      # ── 4. Run full pipeline (ingest → preprocess → models) ─────────────────
      - name: Run DVC pipeline
        run: dvc repro --force

      # ── 5. Commit updated plot back to the repo ───────────────────────────────
      #    output.png is produced by the last pipeline stage (BiLSTM.py)
      #    and is referenced in README.md.  Committing it here means the
      #    README always shows the latest run on GitHub.
      - name: Commit updated forecast plot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.png
          git diff --cached --quiet || git commit -m "ci: update forecast plot [skip ci]"
          git push
